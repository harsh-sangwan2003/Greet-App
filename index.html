<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">


        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <script src="./Scripts/Controller/input.js" type="module"></script>
        <title>Greet App</title>
    </head>

    <body>

        <div class="container">
            <h1 class="alert-success text-center">Greet App</h1>
            <br>

            <div class="form-group">
                <label for="first">First Name</label>
                <input id="first" type="text" class="form-control" placeholder="Enter First Name">
            </div>
            <br>

            <div class="form-group">
                <label for="last">Last Name</label>
                <input id="last" type="text" class="form-control" placeholder="Enter Last Name">
            </div>
            <br>

            <div class="form-group">
                <button class="btn btn-primary" id="greet">Greet</button>
                <button class="btn btn-danger" id="reset">Reset</button>
            </div>
            <br>

            <div>
                <h1 id="msg"></h1>
            </div>
        </div>
    </body>

</html>
